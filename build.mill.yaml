extends: JavaModule

jvmVersion: 21

# Disable the shell/batch launcher that Mill prepends to assembly jars.
# The prefixed bytes make the jar unreadable by javac on JDK < 25
# (ZipException), which breaks JBang's --cp flag and similar tooling.
# To re-enable (makes the jar directly executable as ./out.jar):
#   prependShellScript: default
prependShellScript: ""

repositories:
- https://artifacts.openmicroscopy.org/artifactory/maven/

mvnDeps:
- ome:formats-gpl:8.4.0
- io.modelcontextprotocol.sdk:mcp:1.1.0
- com.tdunning:t-digest:3.3
- org.apache.commons:commons-math3:3.6.1
- org.apache.commons:commons-text:1.13.0
