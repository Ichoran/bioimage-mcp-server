extends: [JavaModule, PublishModule]

publishVersion: 0.1.1

artifactName: bioimage_mcp_server
pomSettings:
  description: "MCP server giving LLM agents access to microscopy image data via Bio-Formats"
  organization: "com.github.ichoran"
  url: "https://github.com/ichoran/bioimage-mcp-server"
  licenses:
  - GPL-3.0-only
  versionControl: "https://github.com/ichoran/bioimage-mcp-server"
  developers:
  - {id: "ichoran", name: "Rex Kerr", email: "rex@kerrrlab.org"}

jvmVersion: 21

# Disable the shell/batch launcher that Mill prepends to assembly jars.
# The prefixed bytes make the jar unreadable by javac on JDK < 25
# (ZipException), which breaks JBang's --cp flag and similar tooling.
# To re-enable (makes the jar directly executable as ./out.jar):
#   prependShellScript: default
prependShellScript: ""

repositories:
- https://artifacts.openmicroscopy.org/artifactory/maven/

mvnDeps:
- ome:formats-gpl:8.4.0
- io.modelcontextprotocol.sdk:mcp:1.1.0
- com.tdunning:t-digest:3.3
- org.apache.commons:commons-math3:3.6.1
- org.apache.commons:commons-text:1.13.0
- commons-cli:commons-cli:1.11.0
- org.slf4j:slf4j-simple:2.0.16
